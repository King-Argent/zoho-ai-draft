<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Draft Assistant</title>
  <script src="https://js.zohostatic.com/support/developer_sdk/v1/js/ZohoDeskClientSDK.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #e2e8f0;
      background: #1a1d23;
      padding: 12px;
    }

    #status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 10px;
      font-size: 12px;
      background: #1e3a5f;
      color: #60a5fa;
      border: 1px solid #2d5a8e;
    }
    #status-bar.success { background: #14532d; color: #4ade80; border-color: #166534; }
    #status-bar.error   { background: #450a0a; color: #f87171; border-color: #7f1d1d; }
    #status-bar.working { background: #3d2e00; color: #fbbf24; border-color: #78550a; }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    #api-key-section input {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #353b47;
      border-radius: 5px;
      font-size: 12px;
      font-family: monospace;
      margin-bottom: 8px;
      background: #1a1d23;
      color: #e2e8f0;
    }
    #api-key-section input:focus { outline: none; border-color: #60a5fa; }

    button {
      padding: 7px 14px;
      border: none;
      border-radius: 5px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    #save-key-btn { background: #2563eb; color: white; }
    #save-key-btn:hover { background: #1d4ed8; }

    #waiting-msg {
      text-align: center;
      color: #64748b;
      font-size: 12px;
      padding: 20px 0;
    }
    #trigger-hint {
      font-size: 11px;
      color: #475569;
      text-align: center;
      margin-top: 6px;
    }

    #draft-section {
      background: #242830;
      border: 1px solid #353b47;
      border-radius: 8px;
      padding: 14px;
      display: none;
    }
    #draft-section h3 {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #e2e8f0;
    }
    #draft-preview {
      width: 100%;
      min-height: 60px;
      max-height: 180px;
      overflow-y: auto;
      padding: 10px;
      border: 1px solid #353b47;
      border-radius: 5px;
      font-size: 12px;
      line-height: 1.6;
      background: #1a1d23;
      color: #94a3b8;
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 10px;
    }
    .button-row {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    #send-to-reply-btn { background: #15803d; color: white; }
    #send-to-reply-btn:hover { background: #166534; }
    #discard-btn { background: #2d3748; color: #94a3b8; }
    #discard-btn:hover { background: #374151; }

    #api-key-section {
      background: #242830;
      border: 1px solid #353b47;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 10px;
    }
    #api-key-section summary {
      font-weight: 600;
      font-size: 12px;
      color: #94a3b8;
      cursor: pointer;
      user-select: none;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #api-key-section summary::before {
      content: "▶";
      font-size: 9px;
      transition: transform 0.2s;
    }
    #api-key-section[open] summary::before {
      transform: rotate(90deg);
    }
    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="status-bar">
    <div class="dot"></div>
    <span>Initialising...</span>
  </div>

  <details id="api-key-section">
    <summary>Gemini API Key</summary>
    <div style="padding-top:10px;">
      <input type="password" id="api-key-input" placeholder="AIza..." autocomplete="off" />
      <button id="save-key-btn">Save Key</button>
    </div>
  </details>

  <div id="waiting-msg">
    Listening for <strong>/fixed</strong> comment...
    <div id="trigger-hint">Type <code>/fixed your note here</code> in a ticket comment</div>
  </div>

  <div id="draft-section">
    <h3>✦ AI Draft Ready</h3>
    <div id="draft-preview"></div>
    <div class="button-row">
      <button id="discard-btn">Discard</button>
      <button id="send-to-reply-btn">Load into Reply Box</button>
    </div>
  </div>

  <script>
    let App;
    let currentDraft = "";

    const statusBar      = document.getElementById("status-bar");
    const apiKeyInput    = document.getElementById("api-key-input");
    const saveKeyBtn     = document.getElementById("save-key-btn");
    const waitingMsg     = document.getElementById("waiting-msg");
    const draftSection   = document.getElementById("draft-section");
    const draftPreview   = document.getElementById("draft-preview");
    const sendToReplyBtn = document.getElementById("send-to-reply-btn");
    const discardBtn     = document.getElementById("discard-btn");

    // ─── Status helper ────────────────────────────────────────────────────────
    function setStatus(msg, type = "info") {
      statusBar.className = type;
      const icon = type === "working"
        ? '<div class="spinner"></div>'
        : '<div class="dot"></div>';
      statusBar.innerHTML = icon + `<span>${msg}</span>`;
    }

    // ─── UI states ────────────────────────────────────────────────────────────
    function showDraft(text) {
      currentDraft = text;
      draftPreview.textContent = text;
      waitingMsg.style.display   = "none";
      draftSection.style.display = "block";
    }

    function resetToWaiting() {
      currentDraft = "";
      draftSection.style.display = "none";
      waitingMsg.style.display   = "block";
      setStatus("Listening for /fixed comment...", "info");
    }

    // ─── API Key ──────────────────────────────────────────────────────────────
    if (localStorage.getItem("gemini_api_key")) {
      apiKeyInput.value = "••••••••••••••••";
    }

    saveKeyBtn.addEventListener("click", () => {
      const val = apiKeyInput.value.trim();
      if (!val || val.startsWith("•")) return;
      localStorage.setItem("gemini_api_key", val);
      apiKeyInput.value = "••••••••••••••••";
      setStatus("API key saved ✓", "success");
      setTimeout(() => setStatus("Listening for /fixed comment...", "info"), 2000);
    });

    // ─── Gemini API ───────────────────────────────────────────────────────────
    async function generateDraft(subject, description, agentNote, firstName) {
      const apiKey = localStorage.getItem("gemini_api_key");
      if (!apiKey) throw new Error("No API key saved. Enter your Gemini key above.");

      const greeting = firstName ? `Hi ${firstName},` : "Hi there,";
      const prompt = `Write a single customer-facing email reply body. No subject line, no metadata, no explanation, no multiple drafts. Just the email body itself, ready to send.

Start with exactly this greeting on its own line: ${greeting}

Ticket subject: ${subject}
Ticket description: ${description}
Agent note: ${agentNote}

Requirements: professional, friendly, concise. Confirm the issue is resolved. One draft only. Never use em dashes (—) in the response.`;

      const response = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite:generateContent?key=${apiKey}`,
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: { thinkingConfig: { thinkingLevel: "minimal" } }
          })
        }
      );

      if (!response.ok) {
        const err = await response.json();
        throw new Error(err.error?.message || "Gemini API error");
      }

      const data = await response.json();
      return data.candidates[0].content.parts[0].text;
    }

    // ─── Load draft into reply box ────────────────────────────────────────────
    async function loadIntoReplyBox(draft) {
      try {
        // Convert plain text newlines to <br> for the HTML editor
        const htmlContent = draft
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\n/g, "<br>");

        await ZOHODESK.invoke("INSERT", "ticket.replyEditor", {
          value: htmlContent + "<br><br>",
          type: "append"
        });
        return true;
      } catch (err) {
        console.error("ticket.replyEditor invoke failed:", err);
        throw err;
      }
    }

    // ─── Main init ────────────────────────────────────────────────────────────
    window.onload = function () {
      ZOHODESK.extension.onload().then(async function (app) {
        App = app;
        setStatus("Listening for /fixed comment...", "info");

        // ── Listen for /fixed comment ────────────────────────────────────────
        App.instance.on("ticket_comment.add", async function (data) {
          const rawComment = data.comment || "";

          // Strip HTML to plain text
          const tmp = document.createElement("div");
          tmp.innerHTML = rawComment;
          const commentText = (tmp.textContent || tmp.innerText || "").trim();

          if (!commentText.toLowerCase().startsWith("/fixed")) return;

          const agentNote = commentText.replace(/^\/fixed\s*/i, "").trim()
            || "Issue has been resolved.";

          setStatus("Generating draft...", "working");

          try {
            const [subjectRes, descRes, ticketRes] = await Promise.all([
              ZOHODESK.get("ticket.subject"),
              ZOHODESK.get("ticket.description"),
              ZOHODESK.get("ticket")
            ]);

            const subject     = subjectRes["ticket.subject"]  || "(no subject)";
            const description = descRes["ticket.description"] || "(no description)";
            const ticket      = ticketRes["ticket"]           || {};
            const fullName    = ticket.contactName            || "";
            const firstName   = fullName.split(" ")[0]        || "";

            const draft = await generateDraft(subject, description, agentNote, firstName);
            showDraft(draft);
            setStatus("Draft ready — review below", "success");

          } catch (err) {
            setStatus("Error: " + err.message, "error");
          }
        });

        // ── Load into reply box ──────────────────────────────────────────────
        sendToReplyBtn.addEventListener("click", async () => {
          if (!currentDraft) return;
          setStatus("Loading into reply box...", "working");
          sendToReplyBtn.disabled = true;

          let ok = false;
          let errMsg = "";
          try {
            ok = await loadIntoReplyBox(currentDraft);
          } catch(e) {
            errMsg = e.message || JSON.stringify(e);
          }

          if (errMsg) {
            setStatus("Error: " + errMsg, "error");
            sendToReplyBtn.disabled = false;
          } else if (ok) {
            setStatus("Draft ready — review below", "success");
            sendToReplyBtn.disabled = false;
          } else {
            setStatus("Draft ready — review below", "success");
            sendToReplyBtn.disabled = false;
          }
        });

        // ── Discard ──────────────────────────────────────────────────────────
        discardBtn.addEventListener("click", resetToWaiting);
      });
    };
  </script>

</body>
</html>
