<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Draft Assistant</title>

  <!-- Zoho Desk Client SDK -->
  <script src="https://js.zohostatic.com/support/developer_sdk/v1/js/ZohoDeskClientSDK.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #e2e8f0;
      background: #1a1d23;
      padding: 12px;
    }

    #status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 10px;
      font-size: 12px;
      background: #1e3a5f;
      color: #60a5fa;
      border: 1px solid #2d5a8e;
    }

    #status-bar.success { background: #14532d; color: #4ade80; border-color: #166534; }
    #status-bar.error   { background: #450a0a; color: #f87171; border-color: #7f1d1d; }
    #status-bar.working { background: #3d2e00; color: #fbbf24; border-color: #78550a; }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    #api-key-section {
      background: #242830;
      border: 1px solid #353b47;
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 10px;
    }

    #api-key-section label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 12px;
      color: #94a3b8;
    }

    #api-key-section input {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #353b47;
      border-radius: 5px;
      font-size: 12px;
      font-family: monospace;
      margin-bottom: 8px;
      background: #1a1d23;
      color: #e2e8f0;
    }

    #api-key-section input:focus {
      outline: none;
      border-color: #60a5fa;
    }

    button {
      padding: 7px 14px;
      border: none;
      border-radius: 5px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    #save-key-btn {
      background: #2563eb;
      color: white;
    }
    #save-key-btn:hover { background: #1d4ed8; }

    #draft-section {
      background: #242830;
      border: 1px solid #353b47;
      border-radius: 8px;
      padding: 14px;
      display: none;
    }

    #draft-section h3 {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #e2e8f0;
    }

    #draft-text {
      width: 100%;
      min-height: 140px;
      padding: 10px;
      border: 1px solid #353b47;
      border-radius: 5px;
      font-size: 12px;
      line-height: 1.6;
      resize: vertical;
      font-family: inherit;
      background: #1a1d23;
      color: #e2e8f0;
    }

    #draft-text:focus { outline: none; border-color: #60a5fa; }

    .button-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      justify-content: flex-end;
    }

    #post-note-btn {
      background: #15803d;
      color: white;
    }
    #post-note-btn:hover { background: #166534; }

    #discard-btn {
      background: #2d3748;
      color: #94a3b8;
    }
    #discard-btn:hover { background: #374151; }

    #waiting-msg {
      text-align: center;
      color: #64748b;
      font-size: 12px;
      padding: 20px 0;
    }

    #trigger-hint {
      font-size: 11px;
      color: #475569;
      text-align: center;
      margin-top: 6px;
    }

    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Status Bar -->
  <div id="status-bar">
    <div class="dot"></div>
    <span id="status-text">Initialising...</span>
  </div>

  <!-- API Key Setup -->
  <div id="api-key-section">
    <label for="api-key-input">Gemini API Key</label>
    <input type="password" id="api-key-input" placeholder="AIza..." autocomplete="off" />
    <button id="save-key-btn">Save Key</button>
  </div>

  <!-- Waiting state -->
  <div id="waiting-msg">
    Listening for <strong>/fixed</strong> comment...
    <div id="trigger-hint">Type <code>/fixed your note here</code> in a ticket comment</div>
  </div>

  <!-- Draft output -->
  <div id="draft-section">
    <h3>✦ AI Draft Reply</h3>
    <textarea id="draft-text" placeholder="Generating..."></textarea>
    <div class="button-row">
      <button id="discard-btn">Discard</button>
      <button id="post-note-btn">Post as Private Note</button>
    </div>
  </div>

  <script>
    // ─── State ───────────────────────────────────────────────────────────────
    let App;
    let currentTicketId = null;
    let storedApiKey = localStorage.getItem("anthropic_api_key") || "";

    // ─── DOM refs ─────────────────────────────────────────────────────────────
    const statusBar    = document.getElementById("status-bar");
    const statusText   = document.getElementById("status-text");
    const apiKeyInput  = document.getElementById("api-key-input");
    const saveKeyBtn   = document.getElementById("save-key-btn");
    const waitingMsg   = document.getElementById("waiting-msg");
    const draftSection = document.getElementById("draft-section");
    const draftText    = document.getElementById("draft-text");
    const postNoteBtn  = document.getElementById("post-note-btn");
    const discardBtn   = document.getElementById("discard-btn");

    // ─── Helpers ──────────────────────────────────────────────────────────────
    function setStatus(msg, type = "info") {
      statusBar.className = type;
      const icon = type === "working"
        ? '<div class="spinner"></div>'
        : '<div class="dot"></div>';
      statusBar.innerHTML = icon + `<span>${msg}</span>`;
    }

    function showDraft(text) {
      waitingMsg.style.display   = "none";
      draftSection.style.display = "block";
      draftText.value = text;
    }

    function resetToWaiting() {
      draftSection.style.display = "none";
      waitingMsg.style.display   = "block";
      setStatus("Listening for /fixed comment...", "info");
    }

    // ─── API Key ──────────────────────────────────────────────────────────────
    if (storedApiKey) {
      apiKeyInput.value = "••••••••••••••••";
    }

    saveKeyBtn.addEventListener("click", () => {
      const val = apiKeyInput.value.trim();
      if (!val || val.startsWith("•")) return;
      localStorage.setItem("anthropic_api_key", val);
      storedApiKey = val;
      apiKeyInput.value = "••••••••••••••••";
      setStatus("API key saved ✓", "success");
      setTimeout(() => setStatus("Listening for /fixed comment...", "info"), 2000);
    });

    // ─── Post private note back to Zoho ──────────────────────────────────────
    async function postPrivateNote(ticketId, noteContent) {
      try {
        // Use the Zoho Desk REST API via the SDK's request proxy
        // This avoids CORS and handles auth automatically
        const response = await ZOHODESK.request({
          url: `https://desk.zoho.com/api/v1/tickets/${ticketId}/comments`,
          type: "POST",
          headers: { "Content-Type": "application/json" },
          data: JSON.stringify({
            content: noteContent,
            isPublic: false
          })
        });
        return { ok: true };
      } catch (err) {
        return { ok: false, error: err };
      }
    }

    // ─── Gemini API call ──────────────────────────────────────────────────────
    async function generateDraft(ticketSubject, ticketDescription, agentComment, firstName) {
      const apiKey = localStorage.getItem("anthropic_api_key");
      if (!apiKey) throw new Error("No API key saved.");

      const greeting = firstName ? `Hi ${firstName},` : "Hi there,";
      const prompt = `Write a single customer-facing email reply body. No subject line, no metadata, no explanation, no multiple drafts, no thinking. Just the email body itself, ready to send.

Always start the email with exactly this greeting on its own line: ${greeting}

Ticket subject: ${ticketSubject}
Ticket description: ${ticketDescription}
Agent note: ${agentComment}

Requirements: professional, friendly, concise. Confirm the issue is resolved. One draft only.`;

      const response = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite:generateContent?key=${apiKey}`,
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: { thinkingConfig: { thinkingLevel: "minimal" } }
          })
        }
      );

      if (!response.ok) {
        const err = await response.json();
        throw new Error(err.error?.message || "Gemini API error");
      }

      const data = await response.json();
      return data.candidates[0].content.parts[0].text;
    }

    // ─── Main: Zoho extension init ────────────────────────────────────────────
    window.onload = function () {
      ZOHODESK.extension.onload().then(async function (app) {
        App = app;
        setStatus("Listening for /fixed comment...", "info");

        // Get current ticket ID
        try {
          const ticketRes = await ZOHODESK.get("ticket.id");
          currentTicketId = ticketRes["ticket.id"];
        } catch (e) {
          setStatus("Could not read ticket ID", "error");
        }

        // ── Listen for new comments ──────────────────────────────────────────
        App.instance.on("ticket_comment.add", async function (data) {
          const rawComment = data.comment || "";

          // Strip HTML tags to get plain text
          const tmp = document.createElement("div");
          tmp.innerHTML = rawComment;
          const commentText = tmp.textContent || tmp.innerText || "";

          // Check for /fixed trigger
          if (!commentText.trim().toLowerCase().startsWith("/fixed")) return;

          // Extract the note after /fixed
          const agentNote = commentText.replace(/^\/fixed\s*/i, "").trim()
            || "Issue has been resolved.";

          setStatus("Generating draft with Gemini...", "working");

          try {
            // Fetch ticket details
            const [subjectRes, descRes, ticketRes] = await Promise.all([
              ZOHODESK.get("ticket.subject"),
              ZOHODESK.get("ticket.description"),
              ZOHODESK.get("ticket")
            ]);

            const subject     = subjectRes["ticket.subject"]     || "(no subject)";
            const description = descRes["ticket.description"]    || "(no description)";
            const ticket      = ticketRes["ticket"]              || {};
            const contact     = ticket.contact                   || {};
            const firstName   = contact.firstName                || "";

            const draft = await generateDraft(subject, description, agentNote, firstName);
            showDraft(draft);
            setStatus("Draft ready — review below", "success");

          } catch (err) {
            setStatus("Error: " + err.message, "error");
          }
        });

        // ── Post note button ─────────────────────────────────────────────────
        postNoteBtn.addEventListener("click", async () => {
          if (!currentTicketId) {
            setStatus("No ticket ID found", "error");
            return;
          }

          const noteContent = draftText.value.trim();
          if (!noteContent) return;

          setStatus("Posting private note...", "working");
          postNoteBtn.disabled = true;

          const result = await postPrivateNote(currentTicketId, noteContent);

          if (result.ok) {
            setStatus("Private note posted ✓", "success");
            setTimeout(resetToWaiting, 2500);
          } else {
            setStatus("Failed to post note. Copy it manually.", "error");
            postNoteBtn.disabled = false;
          }
        });

        // ── Discard button ───────────────────────────────────────────────────
        discardBtn.addEventListener("click", resetToWaiting);
      });
    };
  </script>

</body>
</html>
