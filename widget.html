<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Draft Assistant</title>
  <script src="https://js.zohostatic.com/support/developer_sdk/v1/js/ZohoDeskClientSDK.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #e2e8f0;
      background: #1a1d23;
      padding: 12px;
    }

    #status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 10px;
      font-size: 12px;
      background: #1e3a5f;
      color: #60a5fa;
      border: 1px solid #2d5a8e;
    }
    #status-bar.success { background: #14532d; color: #4ade80; border-color: #166534; }
    #status-bar.error   { background: #450a0a; color: #f87171; border-color: #7f1d1d; }
    #status-bar.working { background: #3d2e00; color: #fbbf24; border-color: #78550a; }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    #api-key-section {
      background: #242830;
      border: 1px solid #353b47;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 10px;
    }
    #api-key-section summary {
      font-weight: 600;
      font-size: 12px;
      color: #94a3b8;
      cursor: pointer;
      user-select: none;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #api-key-section summary::before {
      content: "▶";
      font-size: 9px;
      transition: transform 0.2s;
    }
    #api-key-section[open] summary::before {
      transform: rotate(90deg);
    }
    #api-key-section input {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #353b47;
      border-radius: 5px;
      font-size: 12px;
      font-family: monospace;
      margin-bottom: 8px;
      background: #1a1d23;
      color: #e2e8f0;
    }
    #api-key-section input:focus { outline: none; border-color: #60a5fa; }

    button {
      padding: 7px 14px;
      border: none;
      border-radius: 5px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    #save-key-btn { background: #2563eb; color: white; }
    #save-key-btn:hover { background: #1d4ed8; }

    #waiting-msg {
      text-align: center;
      color: #64748b;
      font-size: 12px;
      padding: 20px 0;
    }
    #command-list {
      margin-top: 10px;
      text-align: left;
      display: inline-block;
    }
    #command-list div {
      font-size: 11px;
      color: #475569;
      margin-bottom: 3px;
    }
    #command-list code {
      color: #60a5fa;
    }

    #draft-section {
      background: #242830;
      border: 1px solid #353b47;
      border-radius: 8px;
      padding: 14px;
      display: none;
    }
    #draft-title {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #e2e8f0;
    }
    #draft-preview {
      width: 100%;
      min-height: 60px;
      max-height: 180px;
      overflow-y: auto;
      padding: 10px;
      border: 1px solid #353b47;
      border-radius: 5px;
      font-size: 12px;
      line-height: 1.6;
      background: #1a1d23;
      color: #94a3b8;
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 10px;
    }
    .button-row {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    #send-to-reply-btn { background: #15803d; color: white; }
    #send-to-reply-btn:hover { background: #166534; }
    #discard-btn { background: #2d3748; color: #94a3b8; }
    #discard-btn:hover { background: #374151; }

    #version {
      position: fixed;
      bottom: 6px;
      left: 8px;
      font-size: 10px;
      color: #2d3748;
    }
    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="status-bar">
    <div class="dot"></div>
    <span>Initialising...</span>
  </div>

  <details id="api-key-section">
    <summary>Gemini API Key</summary>
    <div style="padding-top:10px;">
      <input type="password" id="api-key-input" placeholder="AIza..." autocomplete="off" />
      <button id="save-key-btn">Save Key</button>
    </div>
  </details>

  <div id="waiting-msg">
    <div id="command-list"></div>
  </div>

  <div id="version">v1.9</div>

  <div id="draft-section">
    <div id="draft-title">✦ AI Draft Ready</div>
    <div id="draft-preview"></div>
    <div class="button-row">
      <button id="discard-btn">Discard</button>
      <button id="send-to-reply-btn">Load into Reply Box</button>
    </div>
  </div>

  <script>

    // ═══════════════════════════════════════════════════════════════════════════
    // COMMAND REGISTRY
    // To add a new command, add an entry here. That's it.
    //
    // Each command has:
    //   trigger     - the slash command (lowercase, no slash)
    //   label       - short description shown in the widget
    //   destination - "reply" (loads into reply box) or "note" (private note)
    //   buildPrompt - function(context) returning the prompt string
    //
    // context contains: { subject, description, agentNote, firstName }
    // ═══════════════════════════════════════════════════════════════════════════
    const COMMANDS = {

      fixed: {
        trigger: "fixed",
        label: "/fixed [note] — Generate a resolution email",
        destination: "reply",
        buildPrompt({ subject, description, agentNote, firstName, isFirstEmail }) {
          const greeting = firstName ? `Hi ${firstName},` : "Hi there,";
          const wellLine = isFirstEmail ? "\nLine 2: I hope you are well.\nLine 3: (empty line)" : "\nLine 2: (empty line)";
          return `Write a customer-facing email reply body. Output only the email body, nothing else. No subject line, no metadata, no explanation, no multiple drafts.

Follow this exact structure:
Line 1: ${greeting}${wellLine}
Line 4: Summarise what was done, covering all actions taken. Be concise but include enough detail that the customer understands exactly what was resolved.
Line 5: (empty line)
Line 6: Please let me know if you need anything else,
Line 7: Thanks

Rules: never use em dashes (—), no bullet points, no sign-off name, one draft only.

Ticket subject: ${subject}
Ticket description: ${description}
Agent note: ${agentNote}`;
        }
      },

      r: {
        trigger: "r",
        label: "/r [note] — Generate a follow-up or info-request email",
        destination: "reply",
        buildPrompt({ subject, description, agentNote, firstName, isFirstEmail }) {
          const greeting = firstName ? `Hi ${firstName},` : "Hi there,";
          const wellLine = isFirstEmail ? "\nLine 2: I hope you are well.\nLine 3: (empty line)" : "\nLine 2: (empty line)";
          return `Write a customer-facing email reply body. Output only the email body, nothing else. No subject line, no metadata, no explanation, no multiple drafts.

Follow this exact structure:
Line 1: ${greeting}${wellLine}
Line 4: Based on the context, write an appropriate response that does one or more of the following as needed:
  - Acknowledges the issue the customer has raised
  - Asks the customer for more information or clarification
  - Lets the customer know you are investigating and will follow up
Keep it concise, friendly and professional.
Line 5: (empty line)
Line 6: End with a natural closing sentence that fits the context — either a specific question, a next step, or a note that you will be in touch. Do NOT use "Please let me know if you need anything else" as the closing.

Rules: never use em dashes (—), no bullet points, no sign-off name, no "Thanks" sign-off, one draft only.

Ticket subject: ${subject}
Ticket description: ${description}
Agent note: ${agentNote}`;
        }
      },

      // ── Add new commands below this line ─────────────────────────────────────

    };

    // ═══════════════════════════════════════════════════════════════════════════
    // CORE ENGINE — no need to edit below this line when adding commands
    // ═══════════════════════════════════════════════════════════════════════════

    let App;
    let currentDraft = "";
    let currentDestination = "reply";

    const statusBar      = document.getElementById("status-bar");
    const apiKeyInput    = document.getElementById("api-key-input");
    const saveKeyBtn     = document.getElementById("save-key-btn");
    const waitingMsg     = document.getElementById("waiting-msg");
    const commandList    = document.getElementById("command-list");
    const draftSection   = document.getElementById("draft-section");
    const draftTitle     = document.getElementById("draft-title");
    const draftPreview   = document.getElementById("draft-preview");
    const sendToReplyBtn = document.getElementById("send-to-reply-btn");
    const discardBtn     = document.getElementById("discard-btn");

    // Build command list UI from registry
    Object.values(COMMANDS).forEach(cmd => {
      const div = document.createElement("div");
      div.innerHTML = `<code>/${cmd.trigger}</code> — ${cmd.label.split("—")[1].trim()}`;
      commandList.appendChild(div);
    });

    function setStatus(msg, type = "info") {
      statusBar.className = type;
      const icon = type === "working"
        ? '<div class="spinner"></div>'
        : '<div class="dot"></div>';
      statusBar.innerHTML = icon + `<span>${msg}</span>`;
    }

    function showDraft(text, destination, commandTrigger) {
      currentDraft = text;
      currentDestination = destination;
      draftPreview.textContent = text;
      draftTitle.textContent = `✦ /${commandTrigger} — Draft Ready`;
      sendToReplyBtn.textContent = destination === "reply" ? "Load into Reply Box" : "Post as Private Note";
      waitingMsg.style.display   = "none";
      draftSection.style.display = "block";
    }

    function resetToWaiting() {
      currentDraft = "";
      currentDestination = "reply";
      draftSection.style.display = "none";
      waitingMsg.style.display   = "block";
      sendToReplyBtn.disabled = false;
      setStatus("Listening for commands...", "info");
    }

    // ─── API Key ──────────────────────────────────────────────────────────────
    if (localStorage.getItem("gemini_api_key")) {
      apiKeyInput.value = "••••••••••••••••";
    }

    saveKeyBtn.addEventListener("click", () => {
      const val = apiKeyInput.value.trim();
      if (!val || val.startsWith("•")) return;
      localStorage.setItem("gemini_api_key", val);
      apiKeyInput.value = "••••••••••••••••";
      setStatus("API key saved ✓", "success");
      setTimeout(() => setStatus("Listening for commands...", "info"), 2000);
    });

    // ─── Gemini API call ──────────────────────────────────────────────────────
    async function callGemini(prompt) {
      const apiKey = localStorage.getItem("gemini_api_key");
      if (!apiKey) throw new Error("No API key saved. Enter your Gemini key above.");

      const response = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite:generateContent?key=${apiKey}`,
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: { thinkingConfig: { thinkingLevel: "minimal" } }
          })
        }
      );

      if (!response.ok) {
        const err = await response.json();
        throw new Error(err.error?.message || "Gemini API error");
      }

      const data = await response.json();
      return data.candidates[0].content.parts[0].text.trim();
    }

    // ─── Sign-off enforcer (for reply-type commands) ──────────────────────────
    function enforceSignoff(draft) {
      const signoff = "\n\nPlease let me know if you need anything else,\nThanks";
      const marker  = "Please let me know if you need anything else";
      if (draft.includes(marker)) {
        return draft.substring(0, draft.indexOf(marker)).trimEnd() + signoff;
      }
      return draft.trimEnd() + signoff;
    }

    // ─── Load into reply box ──────────────────────────────────────────────────
    async function loadIntoReplyBox(draft) {
      const htmlContent = draft
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\n/g, "<br>");

      const invokePromise = ZOHODESK.invoke("INSERT", "ticket.replyEditor", {
        value: htmlContent + "<br><br>",
        type: "append"
      }).then(() => true).catch(() => false);

      const timeoutPromise = new Promise(resolve =>
        setTimeout(() => resolve("timeout"), 10000)
      );

      await Promise.race([invokePromise, timeoutPromise]);
      return true;
    }

    // ─── Post as private note ─────────────────────────────────────────────────
    async function postPrivateNote(draft, ticketId) {
      const response = await ZOHODESK.request({
        url: `https://desk.zoho.eu/api/v1/tickets/${ticketId}/comments`,
        type: "POST",
        headers: { "Content-Type": "application/json" },
        data: JSON.stringify({ content: draft, isPublic: false })
      });
      return true;
    }

    // ─── Main init ────────────────────────────────────────────────────────────
    window.onload = function () {
      ZOHODESK.extension.onload().then(async function (app) {
        App = app;
        setStatus("Listening for commands...", "info");

        App.instance.on("ticket_comment.add", async function (data) {
          const rawComment = data.comment || "";
          const tmp = document.createElement("div");
          tmp.innerHTML = rawComment;
          const commentText = (tmp.textContent || tmp.innerText || "").trim();

          // Parse command and note from comment
          const match = commentText.match(/^\/(\w+)\s*(.*)/is);
          if (!match) return;

          const trigger  = match[1].toLowerCase();
          const agentNote = match[2].trim() || "No additional note provided.";

          // Look up command in registry
          const command = COMMANDS[trigger];
          if (!command) return;

          setStatus(`Running /${trigger}...`, "working");

          try {
            const [subjectRes, descRes, ticketRes] = await Promise.all([
              ZOHODESK.get("ticket.subject"),
              ZOHODESK.get("ticket.description"),
              ZOHODESK.get("ticket")
            ]);

            const subject     = subjectRes["ticket.subject"]  || "(no subject)";
            const description = descRes["ticket.description"] || "(no description)";
            const ticket      = ticketRes["ticket"]           || {};
            const fullName    = ticket.contactName            || "";
            const firstName   = fullName.split(" ")[0]        || "";
            const ticketId    = ticket.id                     || "";
            const isFirstEmail = true; // TODO: implement when REST API auth is resolved

            const context = { subject, description, agentNote, firstName, ticketId, isFirstEmail };
            const prompt  = command.buildPrompt(context);
            let draft     = await callGemini(prompt);

            // Enforce sign-off for fixed-type commands only
            if (command.destination === "reply" && command.trigger === "fixed") {
              draft = enforceSignoff(draft);
            }

            showDraft(draft, command.destination, trigger);
            setStatus(`/${trigger} draft ready`, "success");

            // Auto-load into reply box
            if (command.destination === "reply") {
              sendToReplyBtn.click();
            }

          } catch (err) {
            setStatus("Error: " + err.message, "error");
          }
        });

        // ── Send button ──────────────────────────────────────────────────────
        sendToReplyBtn.addEventListener("click", async () => {
          if (!currentDraft) return;
          setStatus("Loading...", "working");
          sendToReplyBtn.disabled = true;

          try {
            if (currentDestination === "reply") {
              await loadIntoReplyBox(currentDraft);
            } else {
              const ticketRes = await ZOHODESK.get("ticket");
              const ticketId  = ticketRes["ticket"]?.id || "";
              await postPrivateNote(currentDraft, ticketId);
            }
            setStatus("Done ✓", "success");
          } catch(e) {
            setStatus("Error: " + (e.message || JSON.stringify(e)), "error");
          }

          sendToReplyBtn.disabled = false;
        });

        discardBtn.addEventListener("click", resetToWaiting);
      });
    };
  </script>

</body>
</html>
